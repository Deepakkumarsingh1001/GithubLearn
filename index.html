<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <button id="dark-mode-toggle" class="dark-toggle" aria-pressed="false" aria-label="Toggle dark mode">🌙 Dark Mode</button>
        <main>
            <h1>Task Manager</h1>
            <form id="task-form" aria-label="Add a new task">
                <input id="task-input" type="text" placeholder="Add a new task..." aria-label="Task description" required autocomplete="off">
                <button type="submit" aria-label="Add task">Add</button>
            </form>
            <nav aria-label="Task filters" class="filter-nav">
                <button type="button" class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
                <button type="button" class="filter-btn" data-filter="pending" aria-pressed="false">Pending</button>
                <button type="button" class="filter-btn" data-filter="completed" aria-pressed="false">Completed</button>
            </nav>
            <ul id="task-list" class="task-list" aria-live="polite"></ul>
        </main>
        <script src="script.js"></script>
    </div>
</body>
        <script src="script.js"></script>
